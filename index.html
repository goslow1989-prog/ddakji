<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>자산 관리 대시보드</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: #0B0E14; }
  #root { min-height: 100vh; }
  input[type=range] { cursor: pointer; width: 100%; }
  input[type=number], input[type=date], input[type=text], select {
    background:#0B0E14; border:1px solid #1F2530; color:#D1D4DC;
    border-radius:6px; padding:6px 8px; font-family:'JetBrains Mono', ui-monospace, monospace;
    font-size:13px; width:100%;
  }
  input:focus, select:focus { outline:1px solid #4C82FB; }
  .card { background:#121620; border:1px solid #1F2530; border-radius:8px; padding:16px; }
  .lbl { font-size:11px; color:#6B7280; letter-spacing:0.04em; text-transform:uppercase; font-family:'JetBrains Mono', ui-monospace, monospace; }
  .num { font-family:'JetBrains Mono', ui-monospace, monospace; }
  .tabBtn { background:transparent; border:1px solid #1F2530; color:#6B7280; padding:8px 16px; border-radius:6px; font-size:13px; cursor:pointer; font-family:'Inter',sans-serif; text-align:left; }
  .tabBtnActive { background:#121620; border:1px solid #4C82FB; color:#D1D4DC; }
  .navBtn { background:transparent; border:none; color:#6B7280; padding:10px 14px; border-radius:6px; font-size:13px; cursor:pointer; font-family:'Inter',sans-serif; text-align:left; width:100%; }
  .navBtnActive { background:#181D28; color:#4C82FB; font-weight:600; }
  table { border-collapse: collapse; width: 100%; }
  th, td { padding: 8px 10px; font-size:12px; border-bottom:1px solid #1F2530; white-space:nowrap; }
  th { color:#6B7280; text-align:left; font-family:'JetBrains Mono', monospace; font-weight:500; }
  td { font-family:'JetBrains Mono', monospace; color:#D1D4DC; }
  .smallBtn { background:#1F2530; border:none; color:#D1D4DC; padding:4px 8px; border-radius:4px; font-size:11px; cursor:pointer; }
  .smallBtn:hover { background:#2A3140; }
  .tableWrap { overflow-x: auto; }
  @media (max-width: 900px) {
    .layoutRoot { flex-direction: column !important; }
    .sidebar { width: 100% !important; flex-direction:row !important; overflow-x:auto; }
  }
  @media (max-width: 720px) {
    .grid3 { grid-template-columns: 1fr !important; }
    .grid5 { grid-template-columns: 1fr 1fr !important; }
    .tierRow { grid-template-columns: 1fr 1fr !important; }
    .pieRow { grid-template-columns: 1fr !important; }
    .entryForm { grid-template-columns: 1fr 1fr !important; }
  }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useMemo, useRef, useEffect } = React;

const COLORS = {
  bg: "#0B0E14", panel: "#121620", panelBorder: "#1F2530",
  text: "#D1D4DC", muted: "#6B7280", accent: "#4C82FB",
  gain: "#26A69A", loss: "#EF5350",
};
const PHASE_COLORS = ["#4C82FB", "#26A69A", "#F2B84B", "#EF5350", "#B084F2", "#4BD0E0"];
const PIE_COLORS = ["#4C82FB", "#26A69A", "#F2B84B", "#EF5350", "#B084F2", "#4BD0E0", "#FF8A65", "#90CAF9", "#A5D6A7", "#CE93D8"];

// ---------- localStorage helpers ----------
function loadLS(key, fallback) {
  try {
    const v = localStorage.getItem(key);
    if (v === null) return fallback;
    return JSON.parse(v);
  } catch (e) { return fallback; }
}
function saveLS(key, value) {
  try { localStorage.setItem(key, JSON.stringify(value)); } catch (e) {}
}
function usePersistentState(key, fallback) {
  const [state, setState] = useState(() => loadLS(key, fallback));
  useEffect(() => { saveLS(key, state); }, [key, state]);
  return [state, setState];
}

// ---------- formatters ----------
const fmt = (n) => "$" + Math.round(n || 0).toLocaleString("en-US");
const fmtExact = (n) => (n < 0 ? "-$" : "$") + Math.abs(Math.trunc(n || 0)).toLocaleString("en-US");
const krwFmt = (n) => "₩" + Math.round(n || 0).toLocaleString("en-US");
const fmtCompact = (n) => {
  if (Math.abs(n) >= 1000000) return "$" + (n / 1000000).toFixed(2) + "M";
  return "$" + (n / 1000).toFixed(0) + "k";
};

// Some exchange public APIs don't send CORS headers for arbitrary origins,
// so requests from a static site (e.g. GitHub Pages) get blocked by the browser.
// Try a direct call first, then fall back through several public CORS proxies
// in order until one actually succeeds (proxy services go down/rate-limit often).
async function corsFetch(url) {
  const attempts = [
    url,
    "https://api.codetabs.com/v1/proxy?quest=" + encodeURIComponent(url),
    "https://corsproxy.io/?url=" + encodeURIComponent(url),
    "https://api.allorigins.win/raw?url=" + encodeURIComponent(url),
  ];
  let lastErr = null;
  for (const attemptUrl of attempts) {
    try {
      const res = await fetch(attemptUrl);
      if (res && res.ok) return res;
      lastErr = new Error("HTTP " + (res ? res.status : "?"));
    } catch (e) {
      lastErr = e;
    }
  }
  throw lastErr || new Error("all proxies failed");
}

function getExpenseForBalance(balance, tiers, aboveAmount) {
  for (const t of tiers) if (balance < t.limit) return t.amount;
  return aboveAmount;
}
function getRateForMonth(m, boundaries, rates) {
  for (let i = 0; i < boundaries.length; i++) if (m <= boundaries[i]) return rates[i];
  return rates[rates.length - 1];
}
function simulate(initialBalance, boundaries, rates, months, withdrawRatePct, tiers, aboveAmount) {
  const w = withdrawRatePct / 100;
  let balance = initialBalance;
  let ath = initialBalance;
  let cumWithdrawnATH = 0;
  let cumExpense = 0;
  let ruinMonth = null;
  const rows = [{ month: 0, balance, cumWithdrawnATH: 0, cumExpense: 0, cumTotal: 0, totalWealth: balance, expenseThisMonth: 0, rate: rates[0] }];
  for (let m = 1; m <= months; m++) {
    const r = getRateForMonth(m, boundaries, rates) / 100;
    let expenseThisMonth = 0;
    if (balance > 0) {
      balance = balance * (1 + r);
      if (balance > ath) {
        const excess = balance - ath;
        const take = excess * w;
        cumWithdrawnATH += take;
        balance -= take;
        ath = balance;
      }
      expenseThisMonth = getExpenseForBalance(balance, tiers, aboveAmount);
      balance -= expenseThisMonth;
      cumExpense += expenseThisMonth;
      if (balance <= 0) { balance = 0; if (ruinMonth === null) ruinMonth = m; }
    } else {
      expenseThisMonth = getExpenseForBalance(0, tiers, aboveAmount);
      cumExpense += expenseThisMonth;
    }
    rows.push({
      month: m, balance: Number(balance.toFixed(0)),
      cumWithdrawnATH: Number(cumWithdrawnATH.toFixed(0)), cumExpense: Number(cumExpense.toFixed(0)),
      cumTotal: Number((cumWithdrawnATH + cumExpense).toFixed(0)), totalWealth: Number((balance + cumWithdrawnATH).toFixed(0)),
      expenseThisMonth: Number(expenseThisMonth.toFixed(0)), rate: getRateForMonth(m, boundaries, rates),
    });
  }
  return { rows, ruinMonth };
}

// ---- Pure-SVG chart components (leaderboard, month-index based) ----
function SingleAreaChart({ data, dataKey, color, height = 220, refValue }) {
  const W = 800, H = height;
  const padL = 55, padR = 10, padT = 10, padB = 24;
  const innerW = W - padL - padR, innerH = H - padT - padB;
  const containerRef = useRef(null);
  const [hover, setHover] = useState(null);
  const values = data.map(d => d[dataKey]);
  const maxY = Math.max(...values, refValue || 0) * 1.1 || 1;
  const minY = Math.min(0, Math.min(...values));
  const x = (i) => padL + (i / (data.length - 1)) * innerW;
  const y = (v) => padT + innerH - ((v - minY) / (maxY - minY)) * innerH;
  const linePath = data.map((d, i) => `${i === 0 ? "M" : "L"} ${x(i)} ${y(d[dataKey])}`).join(" ");
  const areaPath = `${linePath} L ${x(data.length - 1)} ${y(minY)} L ${x(0)} ${y(minY)} Z`;
  const gid = "grad-" + dataKey;
  const handleMove = (e) => {
    const rect = containerRef.current.getBoundingClientRect();
    const frac = Math.min(1, Math.max(0, (e.clientX - rect.left) / rect.width));
    setHover(Math.round(frac * (data.length - 1)));
  };
  const tickEvery = Math.max(1, Math.ceil(data.length / 6));
  return (
    <div ref={containerRef} style={{ position: "relative" }} onMouseMove={handleMove} onMouseLeave={() => setHover(null)}>
      <svg viewBox={`0 0 ${W} ${H}`} style={{ width: "100%", height: "auto", display: "block" }}>
        <defs>
          <linearGradient id={gid} x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stopColor={color} stopOpacity="0.35" />
            <stop offset="100%" stopColor={color} stopOpacity="0" />
          </linearGradient>
        </defs>
        {[0, 0.25, 0.5, 0.75, 1].map((f, i) => (
          <line key={i} x1={padL} x2={W - padR} y1={padT + innerH * f} y2={padT + innerH * f} stroke="#1F2530" strokeDasharray="3 3" />
        ))}
        {[0, 0.5, 1].map((f, i) => {
          const val = maxY - f * (maxY - minY);
          return <text key={i} x={padL - 8} y={padT + innerH * f + 4} textAnchor="end" fontSize="10" fill="#6B7280" fontFamily="monospace">{fmtCompact(val)}</text>;
        })}
        {refValue != null && <line x1={padL} x2={W - padR} y1={y(refValue)} y2={y(refValue)} stroke="#6B7280" strokeDasharray="4 3" />}
        <path d={areaPath} fill={`url(#${gid})`} />
        <path d={linePath} fill="none" stroke={color} strokeWidth="2" />
        {data.map((d, i) => i % tickEvery === 0 && (
          <text key={i} x={x(i)} y={H - 4} textAnchor="middle" fontSize="10" fill="#6B7280" fontFamily="monospace">{d.month}M</text>
        ))}
        {hover !== null && (
          <>
            <line x1={x(hover)} x2={x(hover)} y1={padT} y2={padT + innerH} stroke="#4C82FB" strokeWidth="1" />
            <circle cx={x(hover)} cy={y(data[hover][dataKey])} r="4" fill={color} stroke="#0B0E14" strokeWidth="2" />
          </>
        )}
      </svg>
      {hover !== null && (
        <div style={{ position: "absolute", top: 4, right: 4, background: "#0B0E14", border: "1px solid #1F2530", borderRadius: "6px", padding: "6px 10px", fontSize: "11px", fontFamily: "monospace", color: "#D1D4DC", pointerEvents: "none" }}>
          {data[hover].month}개월차: {fmt(data[hover][dataKey])} (수익률 {data[hover].rate}%)
        </div>
      )}
    </div>
  );
}

function StackedAreaChart({ data, height = 240 }) {
  const W = 800, H = height;
  const padL = 55, padR = 10, padT = 10, padB = 24;
  const innerW = W - padL - padR, innerH = H - padT - padB;
  const containerRef = useRef(null);
  const [hover, setHover] = useState(null);
  const maxY = Math.max(...data.map(d => d.cumTotal)) * 1.1 || 1;
  const x = (i) => padL + (i / (data.length - 1)) * innerW;
  const y = (v) => padT + innerH - (v / maxY) * innerH;
  const bottomLine = data.map((d, i) => `${i === 0 ? "M" : "L"} ${x(i)} ${y(d.cumExpense)}`).join(" ");
  const bottomArea = `${bottomLine} L ${x(data.length - 1)} ${y(0)} L ${x(0)} ${y(0)} Z`;
  const topLine = data.map((d, i) => `${i === 0 ? "M" : "L"} ${x(i)} ${y(d.cumTotal)}`).join(" ");
  const topAreaRev = data.slice().reverse().map((d, i) => `L ${x(data.length - 1 - i)} ${y(d.cumExpense)}`).join(" ");
  const topArea = `${topLine} ${topAreaRev} Z`;
  const handleMove = (e) => {
    const rect = containerRef.current.getBoundingClientRect();
    const frac = Math.min(1, Math.max(0, (e.clientX - rect.left) / rect.width));
    setHover(Math.round(frac * (data.length - 1)));
  };
  const tickEvery = Math.max(1, Math.ceil(data.length / 6));
  return (
    <div ref={containerRef} style={{ position: "relative" }} onMouseMove={handleMove} onMouseLeave={() => setHover(null)}>
      <svg viewBox={`0 0 ${W} ${H}`} style={{ width: "100%", height: "auto", display: "block" }}>
        <defs>
          <linearGradient id="gradExpense" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stopColor={COLORS.loss} stopOpacity="0.5" />
            <stop offset="100%" stopColor={COLORS.loss} stopOpacity="0.15" />
          </linearGradient>
          <linearGradient id="gradATH" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stopColor={COLORS.gain} stopOpacity="0.5" />
            <stop offset="100%" stopColor={COLORS.gain} stopOpacity="0.15" />
          </linearGradient>
        </defs>
        {[0, 0.25, 0.5, 0.75, 1].map((f, i) => (
          <line key={i} x1={padL} x2={W - padR} y1={padT + innerH * f} y2={padT + innerH * f} stroke="#1F2530" strokeDasharray="3 3" />
        ))}
        {[0, 0.5, 1].map((f, i) => {
          const val = maxY * (1 - f);
          return <text key={i} x={padL - 8} y={padT + innerH * f + 4} textAnchor="end" fontSize="10" fill="#6B7280" fontFamily="monospace">{fmtCompact(val)}</text>;
        })}
        <path d={bottomArea} fill="url(#gradExpense)" />
        <path d={bottomLine} fill="none" stroke={COLORS.loss} strokeWidth="1.5" />
        <path d={topArea} fill="url(#gradATH)" />
        <path d={topLine} fill="none" stroke={COLORS.gain} strokeWidth="1.5" />
        {data.map((d, i) => i % tickEvery === 0 && (
          <text key={i} x={x(i)} y={H - 4} textAnchor="middle" fontSize="10" fill="#6B7280" fontFamily="monospace">{d.month}M</text>
        ))}
        {hover !== null && <line x1={x(hover)} x2={x(hover)} y1={padT} y2={padT + innerH} stroke="#4C82FB" strokeWidth="1" />}
      </svg>
      {hover !== null && (
        <div style={{ position: "absolute", top: 4, right: 4, background: "#0B0E14", border: "1px solid #1F2530", borderRadius: "6px", padding: "6px 10px", fontSize: "11px", fontFamily: "monospace", color: "#D1D4DC", pointerEvents: "none", lineHeight: 1.6 }}>
          <div>{data[hover].month}개월차</div>
          <div style={{ color: COLORS.gain }}>ATH 인출: {fmt(data[hover].cumWithdrawnATH)}</div>
          <div style={{ color: COLORS.loss }}>생활비: {fmt(data[hover].cumExpense)} (이달 {fmt(data[hover].expenseThisMonth)})</div>
        </div>
      )}
    </div>
  );
}

function TierEditor({ tiers, setTiers, aboveAmount, setAboveAmount }) {
  const updateTier = (i, field, value) => {
    const next = tiers.slice();
    next[i] = { ...next[i], [field]: Number(value) };
    setTiers(next);
  };
  const labelStyle = { fontSize: "11px", color: COLORS.muted, marginBottom: "4px", fontFamily: "monospace" };
  return (
    <div className="card" style={{ marginBottom: "16px" }}>
      <div className="lbl" style={{ marginBottom: "12px" }}>거래소 시드 구간별 생활비 설정</div>
      <div style={{ display: "flex", flexDirection: "column", gap: "10px" }}>
        {tiers.map((t, i) => {
          const prevLimit = i === 0 ? 0 : tiers[i - 1].limit;
          return (
            <div key={i} className="tierRow" style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: "12px", alignItems: "end" }}>
              <div><div style={labelStyle}>구간 {i + 1}: 잔고 범위</div><div style={{ fontSize: "13px", color: COLORS.text }}>{fmtCompact(prevLimit)} ~ 미만</div></div>
              <div><div style={labelStyle}>이 구간 상한 ($)</div><input type="number" step="10000" value={t.limit} onChange={(e) => updateTier(i, "limit", e.target.value)} /></div>
              <div><div style={labelStyle}>이 구간 월 생활비 ($)</div><input type="number" step="100" value={t.amount} onChange={(e) => updateTier(i, "amount", e.target.value)} /></div>
            </div>
          );
        })}
        <div className="tierRow" style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: "12px", alignItems: "end" }}>
          <div><div style={labelStyle}>최상위 구간</div><div style={{ fontSize: "13px", color: COLORS.text }}>{fmtCompact(tiers[tiers.length - 1].limit)} 이상</div></div>
          <div />
          <div><div style={labelStyle}>월 생활비 ($)</div><input type="number" step="100" value={aboveAmount} onChange={(e) => setAboveAmount(Number(e.target.value))} /></div>
        </div>
      </div>
      <div style={{ fontSize: "11px", color: COLORS.muted, marginTop: "10px" }}>매달 그 시점의 거래소 잔고(ATH 인출 이후)를 기준으로 구간을 판정해 생활비를 차감합니다.</div>
    </div>
  );
}

function PhaseEditor({ boundaries, setBoundaries, rates, setRates, months, setMonths }) {
  const barRef = useRef(null);
  const dragIdx = useRef(null);
  const onMouseDown = (i) => (e) => {
    e.preventDefault();
    dragIdx.current = i;
    window.addEventListener("mousemove", onMouseMove);
    window.addEventListener("mouseup", onMouseUp);
  };
  const onMouseMove = (e) => {
    if (dragIdx.current === null || !barRef.current) return;
    const i = dragIdx.current;
    const rect = barRef.current.getBoundingClientRect();
    const frac = Math.min(1, Math.max(0, (e.clientX - rect.left) / rect.width));
    let m = Math.round(frac * months);
    const lowerBound = i === 0 ? 1 : boundaries[i - 1] + 1;
    const upperBound = i === boundaries.length - 1 ? months - 1 : boundaries[i + 1] - 1;
    m = Math.min(upperBound, Math.max(lowerBound, m));
    setBoundaries(prev => { const next = prev.slice(); next[i] = m; return next; });
  };
  const onMouseUp = () => {
    dragIdx.current = null;
    window.removeEventListener("mousemove", onMouseMove);
    window.removeEventListener("mouseup", onMouseUp);
  };
  useEffect(() => () => {
    window.removeEventListener("mousemove", onMouseMove);
    window.removeEventListener("mouseup", onMouseUp);
  }, []);
  const addPhase = () => {
    const lastBoundary = boundaries.length ? boundaries[boundaries.length - 1] : 0;
    const mid = Math.min(months - 1, lastBoundary + Math.max(1, Math.floor((months - lastBoundary) / 2)));
    if (mid <= lastBoundary) return;
    setBoundaries([...boundaries, mid]);
    setRates([...rates, rates[rates.length - 1]]);
  };
  const removePhase = () => {
    if (boundaries.length <= 1) return;
    setBoundaries(boundaries.slice(0, -1));
    setRates(rates.slice(0, -1));
  };
  const updateRate = (i, v) => {
    const next = rates.slice();
    next[i] = Number(v);
    setRates(next);
  };
  const segStarts = [1, ...boundaries.map(b => b + 1)];
  const segEnds = [...boundaries, months];
  return (
    <div className="card" style={{ marginBottom: "16px" }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: "12px" }}>
        <span className="lbl">기간별 목표 수익률 (드래그로 구간 조정)</span>
        <div style={{ display: "flex", gap: "8px" }}>
          <button className="tabBtn" onClick={removePhase}>- 구간 삭제</button>
          <button className="tabBtn" onClick={addPhase}>+ 구간 추가</button>
        </div>
      </div>
      <div style={{ display: "flex", justifyContent: "space-between", marginBottom: "6px" }}>
        <span className="lbl">총 시뮬레이션 기간</span>
        <span className="num" style={{ fontSize: "14px", color: COLORS.accent }}>{months}개월 ({(months / 12).toFixed(1)}년)</span>
      </div>
      <input type="range" min="3" max="120" step="1" value={months} onChange={(e) => setMonths(Number(e.target.value))} style={{ accentColor: COLORS.accent, marginBottom: "18px" }} />
      <div ref={barRef} style={{ position: "relative", height: "56px", borderRadius: "6px", overflow: "hidden", display: "flex" }}>
        {segStarts.map((s, i) => {
          const e = segEnds[i];
          const widthPct = ((e - s + 1) / months) * 100;
          return (
            <div key={i} style={{ width: `${widthPct}%`, background: PHASE_COLORS[i % PHASE_COLORS.length] + "33", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", position: "relative" }}>
              <div style={{ fontSize: "10px", color: COLORS.muted, fontFamily: "monospace" }}>{s}~{e}M</div>
              <input type="number" value={rates[i]} onChange={(ev) => updateRate(i, ev.target.value)} style={{ width: "56px", textAlign: "center", padding: "3px", fontSize: "13px", marginTop: "2px" }} />
            </div>
          );
        })}
        {boundaries.map((b, i) => (
          <div key={i} onMouseDown={onMouseDown(i)} title={`${b}개월차 경계 (드래그)`}
            style={{ position: "absolute", top: 0, bottom: 0, left: `${(b / months) * 100}%`, width: "6px", marginLeft: "-3px", background: COLORS.accent, cursor: "col-resize", borderRadius: "3px", zIndex: 5 }} />
        ))}
      </div>
      <div style={{ fontSize: "11px", color: COLORS.muted, marginTop: "10px" }}>파란 막대(경계선)를 좌우로 드래그해서 구간 길이를 조정하세요. 각 구간 안의 숫자는 그 구간의 월 목표 수익률(%)이며 직접 입력해도 됩니다. 마지막 구간의 수익률은 그 이후 남은 기간에도 계속 적용됩니다.</div>
    </div>
  );
}

// ---- New chart primitives for Asset Tracker (date-indexed, exact numbers) ----
function DateLineChart({ points, labels, color, height = 260, refValue }) {
  const W = 800, H = height;
  const padL = 90, padR = 14, padT = 18, padB = 34;
  const innerW = W - padL - padR, innerH = H - padT - padB;
  const containerRef = useRef(null);
  const [hover, setHover] = useState(null);
  if (!points.length) return <div style={{ color: COLORS.muted, fontSize: 12, padding: 20 }}>데이터가 없습니다. 아래에서 첫 기록을 추가하세요.</div>;
  const maxY = Math.max(...points, refValue || 0) * 1.08 || 1;
  const minY = Math.min(0, Math.min(...points)) * (Math.min(...points) < 0 ? 1.08 : 1);
  const x = (i) => points.length === 1 ? padL + innerW / 2 : padL + (i / (points.length - 1)) * innerW;
  const y = (v) => padT + innerH - ((v - minY) / (maxY - minY || 1)) * innerH;
  const linePath = points.map((v, i) => `${i === 0 ? "M" : "L"} ${x(i)} ${y(v)}`).join(" ");
  const areaPath = `${linePath} L ${x(points.length - 1)} ${y(minY)} L ${x(0)} ${y(minY)} Z`;
  const handleMove = (e) => {
    const rect = containerRef.current.getBoundingClientRect();
    const frac = Math.min(1, Math.max(0, (e.clientX - rect.left) / rect.width));
    setHover(Math.min(points.length - 1, Math.round(frac * (points.length - 1))));
  };
  const tickEvery = Math.max(1, Math.ceil(points.length / 6));
  return (
    <div ref={containerRef} style={{ position: "relative" }} onMouseMove={handleMove} onMouseLeave={() => setHover(null)}>
      <svg viewBox={`0 0 ${W} ${H}`} style={{ width: "100%", height: "auto", display: "block" }}>
        <defs>
          <linearGradient id="gradAssetLine" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stopColor={color} stopOpacity="0.35" />
            <stop offset="100%" stopColor={color} stopOpacity="0" />
          </linearGradient>
        </defs>
        {[0, 0.25, 0.5, 0.75, 1].map((f, i) => (
          <line key={i} x1={padL} x2={W - padR} y1={padT + innerH * f} y2={padT + innerH * f} stroke="#1F2530" strokeDasharray="3 3" />
        ))}
        {[0, 0.25, 0.5, 0.75, 1].map((f, i) => {
          const val = maxY - f * (maxY - minY);
          return <text key={i} x={padL - 12} y={padT + innerH * f + 5} textAnchor="end" fontSize="15" fontWeight="600" fill="#9CA3AF" fontFamily="monospace">{fmtExact(val)}</text>;
        })}
        <path d={areaPath} fill="url(#gradAssetLine)" />
        <path d={linePath} fill="none" stroke={color} strokeWidth="2.5" />
        {points.map((v, i) => i % tickEvery === 0 && (
          <text key={i} x={x(i)} y={H - 8} textAnchor="middle" fontSize="14" fontWeight="600" fill="#9CA3AF" fontFamily="monospace">{labels[i]}</text>
        ))}
        {hover !== null && (
          <>
            <line x1={x(hover)} x2={x(hover)} y1={padT} y2={padT + innerH} stroke="#4C82FB" strokeWidth="1" />
            <circle cx={x(hover)} cy={y(points[hover])} r="4" fill={color} stroke="#0B0E14" strokeWidth="2" />
          </>
        )}
      </svg>
      {hover !== null && (
        <div style={{ position: "absolute", top: 4, right: 4, background: "#0B0E14", border: "1px solid #1F2530", borderRadius: "6px", padding: "6px 10px", fontSize: "11px", fontFamily: "monospace", color: "#D1D4DC", pointerEvents: "none" }}>
          {labels[hover]}: {fmtExact(points[hover])}
        </div>
      )}
    </div>
  );
}

function ComboFlowChart({ rows, height = 240 }) {
  const W = 800, H = height;
  const padL = 70, padR = 10, padT = 14, padB = 26;
  const innerW = W - padL - padR, innerH = H - padT - padB;
  const containerRef = useRef(null);
  const [hover, setHover] = useState(null);
  if (!rows.length) return <div style={{ color: COLORS.muted, fontSize: 12, padding: 20 }}>입출금 기록이 없습니다.</div>;
  const flows = rows.map(r => r.flow);
  const cums = rows.map(r => r.cumFlow);
  const maxV = Math.max(...flows, ...cums, 0) * 1.15 || 1;
  const minV = Math.min(...flows, ...cums, 0) * 1.15;
  const x = (i) => rows.length === 1 ? padL + innerW / 2 : padL + (i / (rows.length - 1)) * innerW;
  const y = (v) => padT + innerH - ((v - minV) / (maxV - minV || 1)) * innerH;
  const barW = Math.max(2, (innerW / rows.length) * 0.5);
  const cumLine = rows.map((r, i) => `${i === 0 ? "M" : "L"} ${x(i)} ${y(r.cumFlow)}`).join(" ");
  const cumArea = `${cumLine} L ${x(rows.length - 1)} ${y(0)} L ${x(0)} ${y(0)} Z`;
  const handleMove = (e) => {
    const rect = containerRef.current.getBoundingClientRect();
    const frac = Math.min(1, Math.max(0, (e.clientX - rect.left) / rect.width));
    setHover(Math.min(rows.length - 1, Math.round(frac * (rows.length - 1))));
  };
  const tickEvery = Math.max(1, Math.ceil(rows.length / 6));
  return (
    <div ref={containerRef} style={{ position: "relative" }} onMouseMove={handleMove} onMouseLeave={() => setHover(null)}>
      <svg viewBox={`0 0 ${W} ${H}`} style={{ width: "100%", height: "auto", display: "block" }}>
        <defs>
          <linearGradient id="gradCumFlow" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stopColor={COLORS.loss} stopOpacity="0.35" />
            <stop offset="100%" stopColor={COLORS.loss} stopOpacity="0" />
          </linearGradient>
        </defs>
        {[0, 0.25, 0.5, 0.75, 1].map((f, i) => (
          <line key={i} x1={padL} x2={W - padR} y1={padT + innerH * f} y2={padT + innerH * f} stroke="#1F2530" strokeDasharray="3 3" />
        ))}
        {[0, 0.5, 1].map((f, i) => {
          const val = maxV - f * (maxV - minV);
          return <text key={i} x={padL - 8} y={padT + innerH * f + 4} textAnchor="end" fontSize="10" fill="#6B7280" fontFamily="monospace">{fmtExact(val)}</text>;
        })}
        <line x1={padL} x2={W - padR} y1={y(0)} y2={y(0)} stroke="#6B7280" strokeWidth="1" />
        {rows.map((r, i) => (
          <rect key={i} x={x(i) - barW / 2} y={r.flow >= 0 ? y(r.flow) : y(0)} width={barW}
            height={Math.abs(y(r.flow) - y(0))} fill={r.flow >= 0 ? COLORS.gain : COLORS.loss} opacity="0.85" />
        ))}
        <path d={cumArea} fill="url(#gradCumFlow)" />
        <path d={cumLine} fill="none" stroke={COLORS.loss} strokeWidth="2" />
        {rows.map((r, i) => i % tickEvery === 0 && (
          <text key={i} x={x(i)} y={H - 6} textAnchor="middle" fontSize="10" fill="#6B7280" fontFamily="monospace">{r.label}</text>
        ))}
        {hover !== null && <line x1={x(hover)} x2={x(hover)} y1={padT} y2={padT + innerH} stroke="#4C82FB" strokeWidth="1" />}
      </svg>
      {hover !== null && (
        <div style={{ position: "absolute", top: 4, right: 4, background: "#0B0E14", border: "1px solid #1F2530", borderRadius: "6px", padding: "6px 10px", fontSize: "11px", fontFamily: "monospace", color: "#D1D4DC", pointerEvents: "none", lineHeight: 1.6 }}>

        <span><span style={{ color: COLORS.loss }}>■</span> 출금(막대)</span>
        <span><span style={{ color: COLORS.loss }}>—</span> 누적 입출금(선)</span>
      </div>
    </div>
  );
}

function PieChartSVG({ segments, size = 200 }) {
  const total = segments.reduce((s, seg) => s + seg.value, 0);
  if (total <= 0) return <div style={{ color: COLORS.muted, fontSize: 12 }}>표시할 자산 데이터가 없습니다.</div>;
  const r = size / 2 - 6, cx = size / 2, cy = size / 2;
  let angleStart = -90;
  const arcs = segments.filter(s => s.value > 0).map((seg) => {
    const frac = seg.value / total;
    const angleEnd = angleStart + frac * 360;
    const largeArc = (angleEnd - angleStart) > 180 ? 1 : 0;
    const toRad = (a) => (a * Math.PI) / 180;
    const x1 = cx + r * Math.cos(toRad(angleStart)), y1 = cy + r * Math.sin(toRad(angleStart));
    const x2 = cx + r * Math.cos(toRad(angleEnd)), y2 = cy + r * Math.sin(toRad(angleEnd));
    const path = `M ${cx} ${cy} L ${x1} ${y1} A ${r} ${r} 0 ${largeArc} 1 ${x2} ${y2} Z`;
    const result = { ...seg, path, pct: frac * 100 };
    angleStart = angleEnd;
    return result;
  });
  return (
    <div style={{ display: "flex", gap: "18px", alignItems: "center", flexWrap: "wrap" }}>
      <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`}>
        {arcs.map((a, i) => <path key={i} d={a.path} fill={a.color} stroke={COLORS.bg} strokeWidth="1.5" />)}
      </svg>
      <div style={{ display: "flex", flexDirection: "column", gap: "6px" }}>
        {arcs.map((a, i) => (
          <div key={i} style={{ display: "flex", alignItems: "center", gap: "8px", fontSize: "12px" }}>
            <span style={{ width: 10, height: 10, borderRadius: 2, background: a.color, display: "inline-block" }} />
            <span style={{ color: COLORS.text }}>{a.label}</span>
            <span style={{ color: COLORS.muted, fontFamily: "monospace" }}>{a.pct.toFixed(1)}%</span>
          </div>
        ))}
      </div>
    </div>
  );
}

function PercentLineChart({ labels, series, height = 220, refLine }) {
  const W = 800, H = height;
  const padL = 55, padR = 10, padT = 14, padB = 26;
  const innerW = W - padL - padR, innerH = H - padT - padB;
  const containerRef = useRef(null);
  const [hover, setHover] = useState(null);
  const n = series[0] ? series[0].points.length : 0;
  if (!n) return <div style={{ color: COLORS.muted, fontSize: 12, padding: 20 }}>데이터가 없습니다.</div>;
  const allVals = series.flatMap(s => s.points).concat([0]);
  const maxY = Math.max(...allVals) * 1.15 || 1;
  const minY = Math.min(...allVals) * 1.15;
  const x = (i) => n === 1 ? padL + innerW / 2 : padL + (i / (n - 1)) * innerW;
  const y = (v) => padT + innerH - ((v - minY) / (maxY - minY || 1)) * innerH;
  const handleMove = (e) => {
    const rect = containerRef.current.getBoundingClientRect();
    const frac = Math.min(1, Math.max(0, (e.clientX - rect.left) / rect.width));
    setHover(Math.min(n - 1, Math.round(frac * (n - 1))));
  };
  const tickEvery = Math.max(1, Math.ceil(n / 6));
  return (
    <div ref={containerRef} style={{ position: "relative" }} onMouseMove={handleMove} onMouseLeave={() => setHover(null)}>
      <svg viewBox={`0 0 ${W} ${H}`} style={{ width: "100%", height: "auto", display: "block" }}>
        {[0, 0.25, 0.5, 0.75, 1].map((f, i) => (
          <line key={i} x1={padL} x2={W - padR} y1={padT + innerH * f} y2={padT + innerH * f} stroke="#1F2530" strokeDasharray="3 3" />
        ))}
        {[0, 0.5, 1].map((f, i) => {
          const val = maxY - f * (maxY - minY);
          return <text key={i} x={padL - 8} y={padT + innerH * f + 4} textAnchor="end" fontSize="10" fill="#6B7280" fontFamily="monospace">{val.toFixed(1)}%</text>;
        })}
        <line x1={padL} x2={W - padR} y1={y(0)} y2={y(0)} stroke="#6B7280" strokeWidth="1" />
        {refLine != null && (
          <>
            <line x1={padL} x2={W - padR} y1={y(refLine)} y2={y(refLine)} stroke={COLORS.loss} strokeDasharray="5 4" strokeWidth="1.5" />
            <text x={W - padR} y={y(refLine) - 5} textAnchor="end" fontSize="10" fill={COLORS.loss} fontFamily="monospace">기준선 {refLine}%</text>
          </>
        )}
        {series.map((s, si) => {
          const path = s.points.map((v, i) => `${i === 0 ? "M" : "L"} ${x(i)} ${y(v)}`).join(" ");
          return <path key={si} d={path} fill="none" stroke={s.color} strokeWidth="2" />;
        })}
        {labels.map((l, i) => i % tickEvery === 0 && (
          <text key={i} x={x(i)} y={H - 6} textAnchor="middle" fontSize="10" fill="#6B7280" fontFamily="monospace">{l}</text>
        ))}
        {hover !== null && <line x1={x(hover)} x2={x(hover)} y1={padT} y2={padT + innerH} stroke="#4C82FB" strokeWidth="1" />}
      </svg>
      {hover !== null && (
        <div style={{ position: "absolute", top: 4, right: 4, background: "#0B0E14", border: "1px solid #1F2530", borderRadius: "6px", padding: "6px 10px", fontSize: "11px", fontFamily: "monospace", color: "#D1D4DC", pointerEvents: "none", lineHeight: 1.6 }}>
          <div>{labels[hover]}</div>
          {series.map((s, si) => <div key={si} style={{ color: s.color }}>{s.label}: {s.points[hover].toFixed(2)}%</div>)}
        </div>
      )}
      <div style={{ display: "flex", gap: "16px", marginTop: "8px", fontSize: "11px" }}>
        {series.map((s, si) => <span key={si}><span style={{ color: s.color }}>■</span> {s.label}</span>)}
      </div>
    </div>
  );
}

function computeTotalUSD(row) {
  const n = (v) => Number(v) || 0;
  const tether = n(row.tether) || 1;
  const krwSum = n(row.kiwoom) + n(row.upbit) + n(row.bithumb);
  const usdSum = n(row.binance) + n(row.bitget) + n(row.hyperliquid);
  return krwSum / tether + usdSum + n(row.flow);
}

function useUpbitTetherCandles() {
  const [map, setMap] = useState({});
  const [status, setStatus] = useState("idle");
  useEffect(() => {
    setStatus("loading");
    const fetchPage = (to) => {
      const url = "https://api.upbit.com/v1/candles/days?market=KRW-USDT&count=200" + (to ? "&to=" + encodeURIComponent(to) : "");
      return corsFetch(url).then(r => r.json());
    };
    // Page 1: most recent 200 daily candles
    fetchPage(null)
      .then(page1 => {
        const m = {};
        (page1 || []).forEach(r => { m[r.candle_date_time_kst.slice(0, 10)] = r.opening_price; });
        const oldest = page1 && page1.length ? page1[page1.length - 1].candle_date_time_utc : null;
        if (!oldest) { setMap(m); setStatus("ready"); return; }
        // Page 2: another 200 candles further back, to cover earlier dates too
        fetchPage(oldest)
          .then(page2 => {
            (page2 || []).forEach(r => { m[r.candle_date_time_kst.slice(0, 10)] = r.opening_price; });
            setMap(m);
            setStatus("ready");
          })
          .catch(() => { setMap(m); setStatus("ready"); });
      })
      .catch(() => setStatus("error"));
  }, []);
  return { map, status };
}

    return { label: r.date.slice(5), flow: Number(r.flow) || 0, cumFlow: cum };
  });

  // Return-rate series: simple % vs initial seed, and flow-adjusted (chain-linked) %
  const simplePct = totalsAsc.map(v => (initialSeed > 0 ? ((v - initialSeed) / initialSeed) * 100 : 0));
  const twrPct = useMemo(() => {
    let base = initialSeed;
    let idx = 1;
    return totalsAsc.map((v, i) => {
      const flow = Number(sortedAsc[i].flow) || 0;
      const periodReturn = base > 0 ? (v - flow - base) / base : 0;
      idx = idx * (1 + periodReturn);
      base = v;
      return (idx - 1) * 100;
    });
  }, [totalsAsc, sortedAsc, initialSeed]);

  const totalCumFlow = flowRows.length ? flowRows[flowRows.length - 1].cumFlow : 0;
  const firstDate = sortedAsc.length ? new Date(sortedAsc[0].date) : null;
  const lastDate = sortedAsc.length ? new Date(sortedAsc[sortedAsc.length - 1].date) : null;
  const periodDays = firstDate && lastDate ? Math.max(1, Math.round((lastDate - firstDate) / 86400000)) : 0;
  const periodMonths = Math.max(periodDays / 30, 1 / 30);
  const avgMonthlyFlow = flowRows.length ? totalCumFlow / periodMonths : 0;

  const latestRow = sortedDesc[0];
  const latestTether = latestRow ? Number(latestRow.tether) || 1 : 1;

  const pieSegments = useMemo(() => {
    if (!latestRow) return [];
    const n = (v) => Number(v) || 0;
    const segs = [
      { label: "키움증권", value: n(latestRow.kiwoom) / latestTether, color: PIE_COLORS[0] },
      { label: "Upbit", value: n(latestRow.upbit) / latestTether, color: PIE_COLORS[1] },
      { label: "Bithumb", value: n(latestRow.bithumb) / latestTether, color: PIE_COLORS[2] },
      { label: "Binance", value: n(latestRow.binance), color: PIE_COLORS[3] },
      { label: "Bitget", value: n(latestRow.bitget), color: PIE_COLORS[4] },
      { label: "Hyperliquid", value: n(latestRow.hyperliquid), color: PIE_COLORS[5] },
    ];
    const bankNames = { kb: "국민", shinhan: "신한", hana: "하나", k: "케이", toss: "토스", kakao: "카카오" };
    Object.keys(bankNames).forEach((k, idx) => {
      const krw = Number(cashBalances[k]) || 0;
      if (krw > 0) segs.push({ label: bankNames[k] + "은행", value: krw / latestTether, color: PIE_COLORS[6 + (idx % 4)] });
    });
    return segs;
  }, [latestRow, latestTether, cashBalances]);

  const onDateChange = (d) => {
    setForm(f => {
      const autoTether = tetherMap[d];
      const autoBtc = btcMap[d];
      return {
        ...f, date: d,
        tether: autoTether ? String(autoTether) : f.tether,
        btc: autoBtc ? String(Math.round(autoBtc)) : f.btc,
      };
    });
  };
  const updateField = (k, v) => setForm(f => ({ ...f, [k]: v }));

  const submitRow = () => {
    if (!form.date) { alert("날짜를 입력하세요."); return; }
    const next = rows.slice();
    if (editIdx !== null) {
      const originalIdx = rows.findIndex(r => r === sortedDesc[editIdx]);
      next[originalIdx] = form;
    } else {
      next.push(form);
    }
    setRows(next);
    setForm(EMPTY_ASSET_ROW);
    setEditIdx(null);
  };
  const startEdit = (i) => { setForm(sortedDesc[i]); setEditIdx(i); };
  const deleteRow = (i) => {
    if (!confirm("이 기록을 삭제할까요?")) return;
    const target = sortedDesc[i];
    setRows(rows.filter(r => r !== target));
    if (editIdx === i) { setForm(EMPTY_ASSET_ROW); setEditIdx(null); }
  };

  return (
    <div>
      <div className="pieRow" style={{ display: "grid", gridTemplateColumns: "1.5fr 1fr", gap: "16px", marginBottom: "16px" }}>
        <div className="card">
          <div className="lbl" style={{ marginBottom: "12px" }}>총자산 추이 (USD, 전체 표기)</div>
          <DateLineChart points={totalsAsc} labels={dateLabels} color={COLORS.accent} />
        </div>
        <div className="card">
          <div className="lbl" style={{ marginBottom: "12px" }}>자산 구성 비중 (최신 기록 기준)</div>
          <PieChartSVG segments={pieSegments} />
        </div>
      </div>

      <div className="card" style={{ marginBottom: "16px" }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: "12px", flexWrap: "wrap", gap: "10px" }}>
          <span className="lbl">수익률 추이 (초기시드 대비)</span>
          <div style={{ display: "flex", alignItems: "center", gap: "8px" }}>
            <span className="lbl" style={{ marginBottom: 0 }}>기준 초기시드</span>
            <input type="number" value={initialSeed} onChange={(e) => setInitialSeed(Number(e.target.value))} style={{ width: "120px" }} />
          </div>
        </div>
        <PercentLineChart
          labels={dateLabels}
          series={[
            { key: "simple", label: "단순 수익률", color: COLORS.muted, points: simplePct },
            { key: "twr", label: "입출금 조정 수익률", color: COLORS.accent, points: twrPct },
          ]}
        />
        <div style={{ fontSize: "11px", color: COLORS.muted, marginTop: "10px", lineHeight: 1.6 }}>
          단순 수익률은 인출한 생활비까지 손실처럼 반영되어 실제보다 낮게 보일 수 있습니다. 입출금 조정 수익률은 매 구간 입출금 효과를 제외하고 순수 운용 성과만 이어 붙인 값으로, 실제 매매 실력을 보는 데 더 적합합니다.
        </div>
      </div>

      <div className="grid5" style={{ display: "grid", gridTemplateColumns: "repeat(3, 1fr)", gap: "12px", marginBottom: "12px" }}>
        <div className="card"><div className="lbl">총 누적 입출금</div><div className="num" style={{ fontSize: "16px", color: totalCumFlow >= 0 ? COLORS.gain : COLORS.loss, marginTop: "6px" }}>{fmtExact(totalCumFlow)}</div></div>
        <div className="card"><div className="lbl">추적 기간</div><div className="num" style={{ fontSize: "16px", color: COLORS.text, marginTop: "6px" }}>{periodDays}일 ({(periodDays / 30).toFixed(1)}개월)</div></div>
        <div className="card"><div className="lbl">1개월 평균 누적 입출금</div><div className="num" style={{ fontSize: "16px", color: avgMonthlyFlow >= 0 ? COLORS.gain : COLORS.loss, marginTop: "6px" }}>{fmtExact(avgMonthlyFlow)}</div></div>
      </div>

      <div className="card" style={{ marginBottom: "16px" }}>
        <div className="lbl" style={{ marginBottom: "12px" }}>입출금 추이 (월별 막대 + 누적선)</div>
        <ComboFlowChart rows={flowRows} />
      </div>

      <div className="card" style={{ marginBottom: "16px" }}>
        <div className="lbl" style={{ marginBottom: "12px" }}>
          기록 {editIdx !== null ? "수정" : "추가"}
        </div>
        <div className="entryForm" style={{ display: "grid", gridTemplateColumns: "repeat(5, 1fr)", gap: "10px" }}>
          <div><div className="lbl">날짜</div><input type="date" value={form.date} onChange={(e) => onDateChange(e.target.value)} /></div>
          {ASSET_FIELDS.map(f => (
            <div key={f.key}><div className="lbl">{f.label}</div><input type="number" value={form[f.key]} onChange={(e) => updateField(f.key, e.target.value)} placeholder="0" /></div>
          ))}
          <div style={{ gridColumn: "span 2" }}><div className="lbl">메모</div><input type="text" value={form.memo} onChange={(e) => updateField("memo", e.target.value)} /></div>
        </div>
        <div style={{ marginTop: "12px", display: "flex", gap: "8px", alignItems: "center" }}>
          <button className="smallBtn" onClick={submitRow}>{editIdx !== null ? "수정 저장" : "기록 추가"}</button>
          {editIdx !== null && <button className="smallBtn" onClick={() => { setForm(EMPTY_ASSET_ROW); setEditIdx(null); }}>취소</button>}
          <span style={{ fontSize: "11px", color: COLORS.muted }}>예상 총자산: {fmt(computeTotalUSD(form))}</span>
        </div>
      </div>

      <div className="card tableWrap">
        <div className="lbl" style={{ marginBottom: "10px" }}>기록 테이블 (최신순)</div>
        <table>
          <thead>
            <tr>
              <th>날짜</th><th>BTC</th><th>테더</th><th>키움</th><th>Upbit</th><th>Bithumb</th><th>Binance</th><th>Bitget</th><th>Hyperliquid</th><th>입출금</th><th>총자산</th><th>메모</th><th></th>
            </tr>
          </thead>
          <tbody>
            {sortedDesc.map((r, i) => (
              <tr key={i}>
                <td>{r.date}</td>
                <td>{r.btc ? fmt(r.btc) : "-"}</td>
                <td>{r.tether ? krwFmt(r.tether) : "-"}</td>
                <td>{r.kiwoom ? krwFmt(r.kiwoom) : "-"}</td>
                <td>{r.upbit ? krwFmt(r.upbit) : "-"}</td>
                <td>{r.bithumb ? krwFmt(r.bithumb) : "-"}</td>
                <td>{r.binance ? fmt(r.binance) : "-"}</td>
                <td>{r.bitget ? fmt(r.bitget) : "-"}</td>
                <td>{r.hyperliquid ? fmt(r.hyperliquid) : "-"}</td>
                <td style={{ color: Number(r.flow) < 0 ? COLORS.loss : Number(r.flow) > 0 ? COLORS.gain : COLORS.text }}>{r.flow ? fmt(r.flow) : "-"}</td>
                <td style={{ color: COLORS.accent }}>{fmt(computeTotalUSD(r))}</td>
                <td style={{ whiteSpace: "normal", maxWidth: "220px" }}>{r.memo}</td>
                <td>
                  <button className="smallBtn" onClick={() => startEdit(i)}>수정</button>{" "}
                  <button className="smallBtn" onClick={() => deleteRow(i)}>삭제</button>
                </td>
              </tr>
            ))}
            {!sortedDesc.length && <tr><td colSpan={13} style={{ color: COLORS.muted }}>아직 기록이 없습니다.</td></tr>}
          </tbody>
        </table>
      </div>
    </div>
  );
}

        <StackedAreaChart data={data} />
      </div>
      <div className="card" style={{ border: `1px solid ${COLORS.accent}` }}>
        <div className="lbl" style={{ marginBottom: "12px" }}>적정 월 지출액 자동계산</div>
        <div style={{ display: "grid", gridTemplateColumns: "1fr 2fr", gap: "20px", alignItems: "center" }}>
          <div>
            <div style={{ display: "flex", justifyContent: "space-between", marginBottom: "6px" }}>
              <span className="lbl">연간 인출률</span><span className="num" style={{ fontSize: "14px", color: COLORS.accent }}>{safeRate}%</span>
            </div>
            <input type="range" min="0.5" max="10" step="0.1" value={safeRate} onChange={(e) => setSafeRate(Number(e.target.value))} style={{ accentColor: COLORS.accent }} />
          </div>
          <div style={{ fontSize: "12px", color: COLORS.muted, lineHeight: 1.7 }}>({fmt(last.balance)} 거래소 잔고 + {fmt(last.cumTotal)} 누적 인출금) × {safeRate}% ÷ 12</div>
        </div>
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "16px", marginTop: "16px" }}>
          <div style={{ background: COLORS.bg, borderRadius: "8px", padding: "14px" }}>
            <div className="lbl">적정 월 지출액 ({months}개월 시점 기준)</div>
            <div className="num" style={{ fontSize: "20px", color: COLORS.accent, marginTop: "6px" }}>{fmt(recommendedMonthly)}</div>
          </div>
          <div style={{ background: COLORS.bg, borderRadius: "8px", padding: "14px" }}>
            <div className="lbl">현재 구간표상 마지막 달 생활비</div>
            <div className="num" style={{ fontSize: "20px", color: diff > 0 ? COLORS.loss : COLORS.gain, marginTop: "6px" }}>
              {fmt(actualLastExpense)} {diff > 0 ? `(적정보다 +${fmt(diff)} 과다)` : `(적정보다 ${fmt(Math.abs(diff))} 여유)`}
            </div>
          </div>
        </div>
      </div>
      <div style={{ fontSize: "11px", color: COLORS.muted, marginTop: "14px", lineHeight: 1.6, paddingBottom: "10px" }}>
        매달 (1) 해당 구간의 목표 수익률 반영 → (2) ATH 갱신 시 초과분의 20% 인출 → (3) 그 시점 잔고 구간에 맞는 생활비 차감 순으로 계산됩니다. "적정 월 지출액"은 참고용 수치이며 실제 재무 조언이 아닙니다.
      </div>
    </>
  );
}

// ---------- Analysis Tab ----------
function AnalysisTab({ assetRows, cashBalances, liveTetherRate, latestTether, lbSimResult, lbInitialBalance, lbMonths }) {
  const sortedAsc = useMemo(() => assetRows.slice().sort((a, b) => a.date.localeCompare(b.date)), [assetRows]);
  const totals = sortedAsc.map(computeTotalUSD);
  const dateLabels = sortedAsc.map(r => r.date.slice(5));

  if (!sortedAsc.length) {
    return (
      <div className="card" style={{ color: COLORS.muted, fontSize: 13 }}>
        분석할 데이터가 없습니다. 먼저 자산 변동 트래커 탭에서 기록을 추가해주세요.
      </div>
    );
  }

  // A. MDD tracking (real data), danger threshold = -50% from ATH
  let ath = totals[0];
  const drawdownPct = totals.map(v => {
    if (v > ath) ath = v;
    return ath > 0 ? ((v - ath) / ath) * 100 : 0; // negative or 0
  });
  const currentDD = drawdownPct[drawdownPct.length - 1];
  const maxDD = Math.min(...drawdownPct);
  const breached = currentDD <= -50;

  // B. Target vs actual overlay
  const firstDate = new Date(sortedAsc[0].date);
  const lastDate = new Date(sortedAsc[sortedAsc.length - 1].date);
  const elapsedMonths = Math.max(0, Math.floor((lastDate - firstDate) / (30 * 86400000)));
  const overlayMonths = Math.min(elapsedMonths, lbMonths);
  const overlayLabels = [];
  const actualPctSeries = [];
  const targetPctSeries = [];
  const initialActual = totals[0] || 1;
  for (let m = 0; m <= overlayMonths; m++) {
    const cutoff = new Date(firstDate.getTime() + m * 30 * 86400000);
    let bucketVal = totals[0];
    for (let i = 0; i < sortedAsc.length; i++) {
      if (new Date(sortedAsc[i].date) <= cutoff) bucketVal = totals[i];
      else break;
    }
    actualPctSeries.push(((bucketVal - initialActual) / initialActual) * 100);
    const lbRow = lbSimResult.rows[m];
    targetPctSeries.push(lbRow ? ((lbRow.totalWealth - lbInitialBalance) / lbInitialBalance) * 100 : null);
    overlayLabels.push(`${m}M`);
  }
  const hasTargetData = targetPctSeries.some(v => v !== null);

  // C. Win-rate / payoff stats from actual flow-adjusted period returns
  const periodReturns = [];
  for (let i = 1; i < sortedAsc.length; i++) {
    const prev = totals[i - 1];
    if (prev <= 0) continue;
    const flow = Number(sortedAsc[i].flow) || 0;
    const r = (totals[i] - flow - prev) / prev;
    periodReturns.push(r);
  }
  const wins = periodReturns.filter(r => r > 0);
  const losses = periodReturns.filter(r => r < 0);
  const winRate = periodReturns.length ? (wins.length / periodReturns.length) * 100 : 0;
  const avgWin = wins.length ? (wins.reduce((a, b) => a + b, 0) / wins.length) * 100 : 0;
  const avgLoss = losses.length ? (Math.abs(losses.reduce((a, b) => a + b, 0)) / losses.length) * 100 : 0;
  const payoffRatio = avgLoss > 0 ? avgWin / avgLoss : null;

  // D. Concentration warning across exchanges + banks
  const latest = sortedAsc[sortedAsc.length - 1];
  const tether = liveTetherRate || latestTether || Number(latest.tether) || 1;
  const n = (v) => Number(v) || 0;
  const concentrationSegs = [
    { label: "키움증권", value: n(latest.kiwoom) / tether },
    { label: "Upbit", value: n(latest.upbit) / tether },
    { label: "Bithumb", value: n(latest.bithumb) / tether },
    { label: "Binance", value: n(latest.binance) },
    { label: "Bitget", value: n(latest.bitget) },
    { label: "Hyperliquid", value: n(latest.hyperliquid) },
  ];
  const bankNames = { kb: "국민", shinhan: "신한", hana: "하나", k: "케이", toss: "토스", kakao: "카카오" };
  Object.keys(bankNames).forEach(k => {
    const krw = n(cashBalances[k]);
    if (krw > 0) concentrationSegs.push({ label: bankNames[k] + "은행", value: krw / tether });
  });
  const concTotal = concentrationSegs.reduce((s2, x) => s2 + x.value, 0);
  const withPct = concentrationSegs.filter(x => x.value > 0).map(x => ({ ...x, pct: concTotal > 0 ? (x.value / concTotal) * 100 : 0 })).sort((a, b) => b.pct - a.pct);
  const topSeg = withPct[0];
  const CONCENTRATION_WARN_PCT = 40;

  // E. Yearly / monthly flow summary
  const yearlyMap = {};
  const monthlyMap = {};
  sortedAsc.forEach(r => {
    const flow = Number(r.flow) || 0;
    const y = r.date.slice(0, 4);
    const ym = r.date.slice(0, 7);
    yearlyMap[y] = (yearlyMap[y] || 0) + flow;
    monthlyMap[ym] = (monthlyMap[ym] || 0) + flow;
  });
  const yearlyRows = Object.keys(yearlyMap).sort((a, b) => b.localeCompare(a)).map(y => ({ key: y, total: yearlyMap[y] }));
  const monthlyRows = Object.keys(monthlyMap).sort((a, b) => b.localeCompare(a)).map(ym => ({ key: ym, total: monthlyMap[ym] }));

  return (
    <div>
      <div className="card" style={{ marginBottom: "16px", border: breached ? `1px solid ${COLORS.loss}` : `1px solid ${COLORS.panelBorder}` }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", flexWrap: "wrap", gap: "10px", marginBottom: "12px" }}>
          <span className="lbl">실제 자산 낙폭(MDD) 추적 · 위험 기준선 ATH 대비 -50%</span>
          <div style={{ display: "flex", gap: "16px", fontSize: "12px" }}>
            <span>현재 낙폭: <span className="num" style={{ color: currentDD <= -50 ? COLORS.loss : COLORS.text }}>{currentDD.toFixed(1)}%</span></span>
            <span>역대 최대낙폭: <span className="num" style={{ color: COLORS.loss }}>{maxDD.toFixed(1)}%</span></span>
          </div>
        </div>
        {breached && (
          <div style={{ background: "rgba(239,83,80,0.12)", border: `1px solid ${COLORS.loss}`, borderRadius: "8px", padding: "10px 14px", marginBottom: "12px", fontSize: "12px", color: COLORS.loss }}>
            ⚠ 현재 자산이 전고점(ATH) 대비 50% 이상 하락한 상태입니다.
          </div>
        )}
        <PercentLineChart labels={dateLabels} series={[{ key: "dd", label: "ATH 대비 낙폭", color: COLORS.loss, points: drawdownPct }]} refLine={-50} />
      </div>

      <div className="card" style={{ marginBottom: "16px" }}>
        <div className="lbl" style={{ marginBottom: "12px" }}>목표(리더보드) vs 실제 성과 비교</div>
        {hasTargetData ? (
          <>
            <PercentLineChart
              labels={overlayLabels}
              series={[
                { key: "target", label: "목표(리더보드 시뮬레이션)", color: COLORS.muted, points: targetPctSeries.map(v => v === null ? 0 : v) },
                { key: "actual", label: "실제(자산 트래커)", color: COLORS.accent, points: actualPctSeries },
              ]}
            />
            <div style={{ fontSize: "11px", color: COLORS.muted, marginTop: "10px", lineHeight: 1.6 }}>
              복리계산 리더보드 탭에서 설정한 목표 수익률 구간을 기준으로 만든 시뮬레이션과, 자산 변동 트래커에 실제로 기록한 성과를 같은 경과 개월수 기준으로 겹쳐 봅니다. 목표선이 위에 있으면 계획보다 뒤처진 상태, 실제선이 위에 있으면 계획을 앞서는 상태입니다.
            </div>
          </>
        ) : (
          <div style={{ color: COLORS.muted, fontSize: 12 }}>비교할 만큼 기간이 아직 충분하지 않습니다 (최소 1개월 이상의 기록 필요).</div>
        )}
      </div>

      <div className="grid5" style={{ display: "grid", gridTemplateColumns: "repeat(3, 1fr)", gap: "12px", marginBottom: "16px" }}>
        <div className="card">
          <div className="lbl">실제 승률 (기록 구간 기준)</div>
          <div className="num" style={{ fontSize: "18px", color: COLORS.text, marginTop: "6px" }}>{winRate.toFixed(1)}%</div>
          <div style={{ fontSize: "11px", color: COLORS.muted, marginTop: "4px" }}>{wins.length}승 {losses.length}패</div>
        </div>
        <div className="card">
          <div className="lbl">평균 상승폭 / 평균 하락폭</div>
          <div className="num" style={{ fontSize: "16px", marginTop: "6px" }}>
            <span style={{ color: COLORS.gain }}>+{avgWin.toFixed(2)}%</span> / <span style={{ color: COLORS.loss }}>-{avgLoss.toFixed(2)}%</span>
          </div>
        </div>
        <div className="card">
          <div className="lbl">손익비 (평균상승/평균하락)</div>
          <div className="num" style={{ fontSize: "18px", color: COLORS.accent, marginTop: "6px" }}>{payoffRatio ? payoffRatio.toFixed(2) + "R" : "-"}</div>
        </div>
      </div>

      <div className="card" style={{ marginBottom: "16px", border: topSeg && topSeg.pct >= CONCENTRATION_WARN_PCT ? `1px solid ${COLORS.loss}` : `1px solid ${COLORS.panelBorder}` }}>
        <div className="lbl" style={{ marginBottom: "12px" }}>거래소/은행 자산 집중도</div>
        {topSeg && topSeg.pct >= CONCENTRATION_WARN_PCT && (
          <div style={{ background: "rgba(239,83,80,0.12)", border: `1px solid ${COLORS.loss}`, borderRadius: "8px", padding: "10px 14px", marginBottom: "12px", fontSize: "12px", color: COLORS.loss }}>
            ⚠ {topSeg.label}에 전체 자산의 {topSeg.pct.toFixed(1)}%가 몰려있습니다. 해당 거래소의 출금 중단·해킹 등 카운터파티 리스크에 그만큼 크게 노출됩니다.
          </div>
        )}
        <div style={{ display: "flex", flexDirection: "column", gap: "8px" }}>
          {withPct.map((seg, i) => (
            <div key={i} style={{ display: "flex", alignItems: "center", gap: "10px" }}>
              <span style={{ width: "90px", fontSize: "12px", color: COLORS.text }}>{seg.label}</span>
              <div style={{ flex: 1, background: COLORS.bg, borderRadius: "4px", height: "10px", overflow: "hidden" }}>
                <div style={{ width: `${seg.pct}%`, height: "100%", background: seg.pct >= CONCENTRATION_WARN_PCT ? COLORS.loss : COLORS.accent }} />
              </div>
              <span className="num" style={{ fontSize: "11px", color: COLORS.muted, width: "50px", textAlign: "right" }}>{seg.pct.toFixed(1)}%</span>
            </div>
          ))}
        </div>
      </div>

      <div className="card tableWrap">
        <div className="lbl" style={{ marginBottom: "10px" }}>연도별 / 월별 입출금 요약</div>
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "20px" }}>
          <div>
            <div style={{ fontSize: "11px", color: COLORS.muted, marginBottom: "6px" }}>연도별</div>
            <table>
              <thead><tr><th>연도</th><th>순 입출금</th></tr></thead>
              <tbody>
                {yearlyRows.map((r, i) => (
                  <tr key={i}><td>{r.key}</td><td style={{ color: r.total >= 0 ? COLORS.gain : COLORS.loss }}>{fmtExact(r.total)}</td></tr>
                ))}
              </tbody>
            </table>
          </div>
          <div>
            <div style={{ fontSize: "11px", color: COLORS.muted, marginBottom: "6px" }}>월별</div>
            <table>
              <thead><tr><th>월</th><th>순 입출금</th></tr></thead>
              <tbody>
                {monthlyRows.map((r, i) => (
                  <tr key={i}><td>{r.key}</td><td style={{ color: r.total >= 0 ? COLORS.gain : COLORS.loss }}>{fmtExact(r.total)}</td></tr>
                ))}
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  );
}

function App() {
  const [tab, setTab] = useState("leaderboard");
  const [cashBalances, setCashBalances] = usePersistentState("cashBalances_v1", { kb: "", shinhan: "", hana: "", k: "", toss: "", kakao: "" });
  const [assetRowsForCash] = usePersistentState("assetRows_v1", []);
  const fileInputRef = useRef(null);

  const sortedDescForCash = assetRowsForCash.slice().sort((a, b) => b.date.localeCompare(a.date));
  const latestAssetRow = sortedDescForCash[0];
  const latestTether = latestAssetRow ? Number(latestAssetRow.tether) || 1 : 1;
  const { rate: liveTetherRate, status: liveTetherStatus } = useUpbitLiveTether();

  // Leaderboard simulator config, lifted here so the Analysis tab can overlay it against real data
  const lbInitialBalance = 17000;
  const lbWithdrawRate = 20;
  const [lbMonths, setLbMonths] = useState(36);
  const [lbBoundaries, setLbBoundaries] = useState([12, 24]);
  const [lbRates, setLbRates] = useState([30, 20, 15]);
  const [lbTiers, setLbTiers] = useState([
    { limit: 100000, amount: 2000 }, { limit: 500000, amount: 3000 }, { limit: 1000000, amount: 5000 },
  ]);
  const [lbAboveAmount, setLbAboveAmount] = useState(7000);
  const [lbSafeRate, setLbSafeRate] = useState(2.5);
  const lbSimResult = useMemo(
    () => simulate(lbInitialBalance, lbBoundaries, lbRates, lbMonths, lbWithdrawRate, lbTiers, lbAboveAmount),
    [lbBoundaries, lbRates, lbMonths, lbTiers, lbAboveAmount]
  );

  const exportData = () => {
    const payload = {
      exportedAt: new Date().toISOString(),
      assetRows: loadLS("assetRows_v1", []),
      cashBalances: loadLS("cashBalances_v1", {}),
      watchlistRows: loadLS("watchlistRows_v1", []),
    };
    const blob = new Blob([JSON.stringify(payload, null, 2)], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    const d = new Date().toISOString().slice(0, 10);
    a.href = url;
    a.download = `asset-backup-${d}.json`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  };

  const triggerImport = () => { if (fileInputRef.current) fileInputRef.current.click(); };

  const handleImportFile = (e) => {
    const file = e.target.files && e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const data = JSON.parse(ev.target.result);
        if (!confirm("현재 기기에 저장된 데이터를 백업 파일 내용으로 덮어씁니다. 계속할까요?")) return;
        if (Array.isArray(data.assetRows)) saveLS("assetRows_v1", data.assetRows);
        if (data.cashBalances && typeof data.cashBalances === "object") saveLS("cashBalances_v1", data.cashBalances);
        if (Array.isArray(data.watchlistRows)) saveLS("watchlistRows_v1", data.watchlistRows);
        alert("가져오기 완료. 페이지를 새로고침합니다.");
        window.location.reload();
      } catch (err) {
        alert("파일을 읽지 못했습니다. 올바른 백업(JSON) 파일인지 확인해주세요.");
      }
    };
    reader.readAsText(file);
    e.target.value = "";
  };

  return (
    <div style={{ background: COLORS.bg, color: COLORS.text, fontFamily: "'Inter', -apple-system, sans-serif", minHeight: "100vh" }}>
      <div className="layoutRoot" style={{ display: "flex", maxWidth: "1200px", margin: "0 auto", padding: "20px", gap: "20px" }}>
        <div className="sidebar" style={{ width: "200px", flexShrink: 0, display: "flex", flexDirection: "column", gap: "4px" }}>
          <div style={{ fontSize: "16px", fontWeight: 700, marginBottom: "14px", padding: "0 14px" }}>자산 관리</div>
          {NAV_ITEMS.map(item => (
            <button key={item.key} className={"navBtn" + (tab === item.key ? " navBtnActive" : "")} onClick={() => setTab(item.key)}>
              {item.label}
            </button>
          ))}
          <div style={{ height: "1px", background: COLORS.panelBorder, margin: "10px 14px" }} />
          <div style={{ fontSize: "11px", color: COLORS.muted, padding: "0 14px", marginBottom: "6px", fontFamily: "monospace", textTransform: "uppercase", letterSpacing: "0.04em" }}>데이터 관리</div>
          <button className="navBtn" onClick={exportData}>⬇ 내보내기 (백업)</button>
          <button className="navBtn" onClick={triggerImport}>⬆ 가져오기 (복원)</button>
          <input ref={fileInputRef} type="file" accept="application/json" onChange={handleImportFile} style={{ display: "none" }} />
        </div>
        <div style={{ flex: 1, minWidth: 0, paddingBottom: "40px" }}>
          {tab === "leaderboard" && (
            <LeaderboardPanel
              initialBalance={lbInitialBalance} months={lbMonths} setMonths={setLbMonths}
              boundaries={lbBoundaries} setBoundaries={setLbBoundaries} rates={lbRates} setRates={setLbRates}
              tiers={lbTiers} setTiers={setLbTiers} aboveAmount={lbAboveAmount} setAboveAmount={setLbAboveAmount}
              safeRate={lbSafeRate} setSafeRate={setLbSafeRate} simResult={lbSimResult}
            />
          )}
          {tab === "analysis" && (
            <AnalysisTab
              assetRows={assetRowsForCash} cashBalances={cashBalances}
              liveTetherRate={liveTetherRate} latestTether={latestTether}
              lbSimResult={lbSimResult} lbInitialBalance={lbInitialBalance} lbMonths={lbMonths}
            />
          )}
          {tab === "quotes" && <QuotesTab />}
          {tab === "tracker" && <AssetTrackerTab cashBalances={cashBalances} />}
          {tab === "cash" && <CashTab cashBalances={cashBalances} setCashBalances={setCashBalances} latestAssetRow={latestAssetRow} latestTether={latestTether} liveTetherRate={liveTetherRate} liveTetherStatus={liveTetherStatus} />}
          {tab === "watchlist" && <WatchlistTab />}
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
