<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ATH 20% 인출 + 생활비 대시보드</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: #0B0E14; }
  #root { min-height: 100vh; }
  input[type=range] { cursor: pointer; width: 100%; }
  .card { background:#121620; border:1px solid #1F2530; border-radius:8px; padding:16px; }
  .lbl { font-size:11px; color:#6B7280; letter-spacing:0.04em; text-transform:uppercase; font-family:'JetBrains Mono', ui-monospace, monospace; }
  .num { font-family:'JetBrains Mono', ui-monospace, monospace; }
  @media (max-width: 720px) {
    .grid3 { grid-template-columns: 1fr !important; }
    .grid5 { grid-template-columns: 1fr 1fr !important; }
  }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useMemo, useRef } = React;

const COLORS = {
  bg: "#0B0E14", panel: "#121620", panelBorder: "#1F2530",
  text: "#D1D4DC", muted: "#6B7280", accent: "#4C82FB",
  gain: "#26A69A", loss: "#EF5350",
};

function simulate(initialBalance, monthlyReturnPct, months, withdrawRatePct, monthlyExpense) {
  const r = monthlyReturnPct / 100;
  const w = withdrawRatePct / 100;
  let balance = initialBalance;
  let ath = initialBalance;
  let cumWithdrawnATH = 0;
  let cumExpense = 0;
  let ruinMonth = null;

  const rows = [{ month: 0, balance, cumWithdrawnATH: 0, cumExpense: 0, cumTotal: 0, totalWealth: balance }];

  for (let m = 1; m <= months; m++) {
    if (balance > 0) {
      balance = balance * (1 + r);
      if (balance > ath) {
        const excess = balance - ath;
        const take = excess * w;
        cumWithdrawnATH += take;
        balance -= take;
        ath = balance;
      }
      balance -= monthlyExpense;
      cumExpense += monthlyExpense;
      if (balance <= 0) {
        balance = 0;
        if (ruinMonth === null) ruinMonth = m;
      }
    } else {
      cumExpense += monthlyExpense;
    }
    rows.push({
      month: m,
      balance: Number(balance.toFixed(0)),
      cumWithdrawnATH: Number(cumWithdrawnATH.toFixed(0)),
      cumExpense: Number(cumExpense.toFixed(0)),
      cumTotal: Number((cumWithdrawnATH + cumExpense).toFixed(0)),
      totalWealth: Number((balance + cumWithdrawnATH).toFixed(0)),
    });
  }
  return { rows, ruinMonth };
}

const fmt = (n) => "$" + Math.round(n).toLocaleString("en-US");

// ---- Pure-SVG chart components (no external chart library) ----

function SingleAreaChart({ data, dataKey, color, height = 220, refValue }) {
  const W = 800, H = height;
  const padL = 50, padR = 10, padT = 10, padB = 24;
  const innerW = W - padL - padR, innerH = H - padT - padB;
  const containerRef = useRef(null);
  const [hover, setHover] = useState(null);

  const values = data.map(d => d[dataKey]);
  const maxY = Math.max(...values, refValue || 0) * 1.1 || 1;
  const minY = Math.min(0, Math.min(...values));

  const x = (i) => padL + (i / (data.length - 1)) * innerW;
  const y = (v) => padT + innerH - ((v - minY) / (maxY - minY)) * innerH;

  const linePath = data.map((d, i) => `${i === 0 ? "M" : "L"} ${x(i)} ${y(d[dataKey])}`).join(" ");
  const areaPath = `${linePath} L ${x(data.length - 1)} ${y(minY)} L ${x(0)} ${y(minY)} Z`;

  const gid = "grad-" + dataKey;

  const handleMove = (e) => {
    const rect = containerRef.current.getBoundingClientRect();
    const frac = Math.min(1, Math.max(0, (e.clientX - rect.left) / rect.width));
    const idx = Math.round(frac * (data.length - 1));
    setHover(idx);
  };

  return (
    <div ref={containerRef} style={{ position: "relative" }}
      onMouseMove={handleMove} onMouseLeave={() => setHover(null)}>
      <svg viewBox={`0 0 ${W} ${H}`} style={{ width: "100%", height: "auto", display: "block" }}>
        <defs>
          <linearGradient id={gid} x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stopColor={color} stopOpacity="0.35" />
            <stop offset="100%" stopColor={color} stopOpacity="0" />
          </linearGradient>
        </defs>
        {[0, 0.25, 0.5, 0.75, 1].map((f, i) => (
          <line key={i} x1={padL} x2={W - padR} y1={padT + innerH * f} y2={padT + innerH * f}
            stroke="#1F2530" strokeDasharray="3 3" />
        ))}
        {[0, 0.5, 1].map((f, i) => {
          const val = maxY - f * (maxY - minY);
          return (
            <text key={i} x={padL - 8} y={padT + innerH * f + 4} textAnchor="end"
              fontSize="10" fill="#6B7280" fontFamily="monospace">
              ${(val / 1000).toFixed(0)}k
            </text>
          );
        })}
        {refValue != null && (
          <line x1={padL} x2={W - padR} y1={y(refValue)} y2={y(refValue)}
            stroke="#6B7280" strokeDasharray="4 3" />
        )}
        <path d={areaPath} fill={`url(#${gid})`} />
        <path d={linePath} fill="none" stroke={color} strokeWidth="2" />
        {data.map((d, i) => (
          i % Math.ceil(data.length / 6) === 0 && (
            <text key={i} x={x(i)} y={H - 4} textAnchor="middle" fontSize="10" fill="#6B7280" fontFamily="monospace">
              {d.month}M
            </text>
          )
        ))}
        {hover !== null && (
          <>
            <line x1={x(hover)} x2={x(hover)} y1={padT} y2={padT + innerH} stroke="#4C82FB" strokeWidth="1" />
            <circle cx={x(hover)} cy={y(data[hover][dataKey])} r="4" fill={color} stroke="#0B0E14" strokeWidth="2" />
          </>
        )}
      </svg>
      {hover !== null && (
        <div style={{
          position: "absolute", top: 4, right: 4, background: "#0B0E14",
          border: "1px solid #1F2530", borderRadius: "6px", padding: "6px 10px",
          fontSize: "11px", fontFamily: "monospace", color: "#D1D4DC", pointerEvents: "none",
        }}>
          {data[hover].month}개월차: {fmt(data[hover][dataKey])}
        </div>
      )}
    </div>
  );
}

function StackedAreaChart({ data, height = 240 }) {
  const W = 800, H = height;
  const padL = 50, padR = 10, padT = 10, padB = 24;
  const innerW = W - padL - padR, innerH = H - padT - padB;
  const containerRef = useRef(null);
  const [hover, setHover] = useState(null);

  const maxY = Math.max(...data.map(d => d.cumTotal)) * 1.1 || 1;
  const x = (i) => padL + (i / (data.length - 1)) * innerW;
  const y = (v) => padT + innerH - (v / maxY) * innerH;

  const bottomLine = data.map((d, i) => `${i === 0 ? "M" : "L"} ${x(i)} ${y(d.cumExpense)}`).join(" ");
  const bottomArea = `${bottomLine} L ${x(data.length - 1)} ${y(0)} L ${x(0)} ${y(0)} Z`;

  const topLine = data.map((d, i) => `${i === 0 ? "M" : "L"} ${x(i)} ${y(d.cumTotal)}`).join(" ");
  const topAreaRev = data.slice().reverse().map((d, i) => `L ${x(data.length - 1 - i)} ${y(d.cumExpense)}`).join(" ");
  const topArea = `${topLine} ${topAreaRev} Z`;

  const handleMove = (e) => {
    const rect = containerRef.current.getBoundingClientRect();
    const frac = Math.min(1, Math.max(0, (e.clientX - rect.left) / rect.width));
    const idx = Math.round(frac * (data.length - 1));
    setHover(idx);
  };

  return (
    <div ref={containerRef} style={{ position: "relative" }}
      onMouseMove={handleMove} onMouseLeave={() => setHover(null)}>
      <svg viewBox={`0 0 ${W} ${H}`} style={{ width: "100%", height: "auto", display: "block" }}>
        <defs>
          <linearGradient id="gradExpense" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stopColor={COLORS.loss} stopOpacity="0.5" />
            <stop offset="100%" stopColor={COLORS.loss} stopOpacity="0.15" />
          </linearGradient>
          <linearGradient id="gradATH" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stopColor={COLORS.gain} stopOpacity="0.5" />
            <stop offset="100%" stopColor={COLORS.gain} stopOpacity="0.15" />
          </linearGradient>
        </defs>
        {[0, 0.25, 0.5, 0.75, 1].map((f, i) => (
          <line key={i} x1={padL} x2={W - padR} y1={padT + innerH * f} y2={padT + innerH * f}
            stroke="#1F2530" strokeDasharray="3 3" />
        ))}
        {[0, 0.5, 1].map((f, i) => {
          const val = maxY * (1 - f);
          return (
            <text key={i} x={padL - 8} y={padT + innerH * f + 4} textAnchor="end"
              fontSize="10" fill="#6B7280" fontFamily="monospace">
              ${(val / 1000).toFixed(0)}k
            </text>
          );
        })}
        <path d={bottomArea} fill="url(#gradExpense)" />
        <path d={bottomLine} fill="none" stroke={COLORS.loss} strokeWidth="1.5" />
        <path d={topArea} fill="url(#gradATH)" />
        <path d={topLine} fill="none" stroke={COLORS.gain} strokeWidth="1.5" />
        {data.map((d, i) => (
          i % Math.ceil(data.length / 6) === 0 && (
            <text key={i} x={x(i)} y={H - 4} textAnchor="middle" fontSize="10" fill="#6B7280" fontFamily="monospace">
              {d.month}M
            </text>
          )
        ))}
        {hover !== null && (
          <line x1={x(hover)} x2={x(hover)} y1={padT} y2={padT + innerH} stroke="#4C82FB" strokeWidth="1" />
        )}
      </svg>
      {hover !== null && (
        <div style={{
          position: "absolute", top: 4, right: 4, background: "#0B0E14",
          border: "1px solid #1F2530", borderRadius: "6px", padding: "6px 10px",
          fontSize: "11px", fontFamily: "monospace", color: "#D1D4DC", pointerEvents: "none",
          lineHeight: 1.6,
        }}>
          <div>{data[hover].month}개월차</div>
          <div style={{ color: COLORS.gain }}>ATH 인출: {fmt(data[hover].cumWithdrawnATH)}</div>
          <div style={{ color: COLORS.loss }}>생활비: {fmt(data[hover].cumExpense)}</div>
        </div>
      )}
    </div>
  );
}

function Dashboard() {
  const [initialBalance] = useState(17000);
  const [monthlyReturn, setMonthlyReturn] = useState(10);
  const [months, setMonths] = useState(12);
  const [monthlyExpense, setMonthlyExpense] = useState(2000);
  const withdrawRate = 20;

  const { rows: data, ruinMonth } = useMemo(
    () => simulate(initialBalance, monthlyReturn, months, withdrawRate, monthlyExpense),
    [initialBalance, monthlyReturn, months, monthlyExpense]
  );
  const last = data[data.length - 1];

  return (
    <div style={{ background: COLORS.bg, color: COLORS.text, fontFamily: "'Inter', -apple-system, sans-serif", padding: "20px", minHeight: "100vh" }}>
      <div style={{ maxWidth: "1000px", margin: "0 auto" }}>
        <div style={{ marginBottom: "18px" }}>
          <div style={{ fontSize: "20px", fontWeight: 700, letterSpacing: "-0.01em" }}>ATH 20% 인출 + 생활비 대시보드</div>
          <div style={{ fontSize: "12px", color: COLORS.muted, marginTop: "4px" }}>
            초기잔고 {fmt(initialBalance)} · 전고점 갱신 시 초과분의 20% 인출 · 월 고정 생활비 차감
          </div>
        </div>

        <div className="grid3 card" style={{ marginBottom: "16px", display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: "24px" }}>
          <div>
            <div style={{ display: "flex", justifyContent: "space-between", marginBottom: "6px" }}>
              <span className="lbl">월 수익률 (고정 가정)</span>
              <span className="num" style={{ fontSize: "16px", color: monthlyReturn >= 0 ? COLORS.gain : COLORS.loss }}>
                {monthlyReturn > 0 ? "+" : ""}{monthlyReturn}%
              </span>
            </div>
            <input type="range" min="-30" max="50" step="1" value={monthlyReturn}
              onChange={(e) => setMonthlyReturn(Number(e.target.value))} style={{ accentColor: COLORS.accent }} />
          </div>
          <div>
            <div style={{ display: "flex", justifyContent: "space-between", marginBottom: "6px" }}>
              <span className="lbl">월 고정 생활비 인출</span>
              <span className="num" style={{ fontSize: "16px", color: COLORS.loss }}>${monthlyExpense.toLocaleString("en-US")}</span>
            </div>
            <input type="range" min="0" max="10000" step="100" value={monthlyExpense}
              onChange={(e) => setMonthlyExpense(Number(e.target.value))} style={{ accentColor: COLORS.loss }} />
          </div>
          <div>
            <div style={{ display: "flex", justifyContent: "space-between", marginBottom: "6px" }}>
              <span className="lbl">기간</span>
              <span className="num" style={{ fontSize: "16px", color: COLORS.accent }}>{months}개월</span>
            </div>
            <input type="range" min="3" max="120" step="1" value={months}
              onChange={(e) => setMonths(Number(e.target.value))} style={{ accentColor: COLORS.accent }} />
          </div>
        </div>

        {ruinMonth !== null && (
          <div style={{ background: "rgba(239,83,80,0.1)", border: `1px solid ${COLORS.loss}`, borderRadius: "8px", padding: "10px 14px", marginBottom: "16px", fontSize: "12px", color: COLORS.loss }}>
            ⚠ {ruinMonth}개월차에 잔고가 소진됩니다 (생활비 인출이 계좌 성장을 초과).
          </div>
        )}

        <div className="grid5" style={{ display: "grid", gridTemplateColumns: "repeat(5, 1fr)", gap: "12px", marginBottom: "16px" }}>
          {[
            { label: `${months}개월 후 거래소 잔고`, value: fmt(last.balance), color: COLORS.text },
            { label: "누적 ATH 20% 인출", value: fmt(last.cumWithdrawnATH), color: COLORS.gain },
            { label: "누적 생활비 인출", value: fmt(last.cumExpense), color: COLORS.loss },
            { label: "총 누적 인출액", value: fmt(last.cumTotal), color: COLORS.accent },
            { label: "총자산 배수", value: (last.totalWealth / initialBalance).toFixed(2) + "x", color: COLORS.accent },
          ].map((c, i) => (
            <div key={i} className="card">
              <div className="lbl">{c.label}</div>
              <div className="num" style={{ fontSize: "16px", color: c.color, marginTop: "6px" }}>{c.value}</div>
            </div>
          ))}
        </div>

        <div className="card" style={{ marginBottom: "16px" }}>
          <div className="lbl" style={{ marginBottom: "12px" }}>거래소 잔고 추이</div>
          <SingleAreaChart data={data} dataKey="balance" color={COLORS.accent} refValue={initialBalance} />
        </div>

        <div className="card">
          <div className="lbl" style={{ marginBottom: "4px" }}>누적 출금액 추이</div>
          <div style={{ display: "flex", gap: "16px", marginBottom: "10px", fontSize: "11px" }}>
            <span style={{ color: COLORS.gain }}>■ ATH 20% 인출</span>
            <span style={{ color: COLORS.loss }}>■ 생활비 인출</span>
          </div>
          <StackedAreaChart data={data} />
        </div>

        <div style={{ fontSize: "11px", color: COLORS.muted, marginTop: "14px", lineHeight: 1.6, paddingBottom: "30px" }}>
          월 수익률은 매달 동일하다고 가정한 결정론적 시나리오입니다. 매달 (1) 수익률 반영 → (2) ATH 갱신 시 초과분의 20% 인출 → (3) 고정 생활비 차감 순으로 계산됩니다. 차트 위에 마우스를 올리면 월별 수치를 확인할 수 있습니다.
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<Dashboard />);
</script>
</body>
</html>
